# BuffettKnowledge AI Ask Worker
# Cloudflare Workers Configuration

name = "buffettknowledge-ask"
main = "workers/ask/index.ts"
compatibility_date = "2024-01-01"

# Workers AI (optional - can use OpenAI instead)
# ai = { binding = "AI" }

# Environment variables (set via Cloudflare dashboard or CLI)
# OPENAI_API_KEY - required for OpenAI API calls

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Deploy with:
# wrangler deploy
# Set secrets with:
# wrangler secret put OPENAI_API_KEY

# BuffettKnowledge AI Ask Worker
# Cloudflare Workers Configuration

name = "buffettknowledge-ask"
main = "workers/ask/index.ts"
compatibility_date = "2024-01-01"

# Workers AI (optional - can use Gemini instead)
# ai = { binding = "AI" }

# Environment variables (set via Cloudflare dashboard or CLI)
# GEMINI_API_KEY - required for Gemini API calls (free tier available)

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Deploy with:
# wrangler deploy
# Set secrets with:
# wrangler secret put GEMINI_API_KEY
